services:
  trove:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trove
    restart: unless-stopped

    ports:
      - "8080:8080"      # change left side if 8080 is taken on your host

    volumes:
      # Persist the git working tree (saves + history) on the host
      - trove-data:/data/saves

    environment:
      - TZ=Europe/London   # set your timezone

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/files"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  trove-data:
    driver: local
